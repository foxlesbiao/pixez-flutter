name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * 1'  # 每周一
  workflow_dispatch:       # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置上游
        run: |
          git remote add upstream https://github.com/Notsfsssf/pixez-flutter.git
          git fetch upstream

      - name: 合并上游
        run: git merge upstream/master --no-edit

      - name: 应用自定义 Patch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git apply fox-custom.patch
          git add .
          git commit -m "reapply: fox custom patches" || echo "无改动"

      - name: 推送
        run: git push origin master
