name: Build Android APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 签出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 初始化 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter 版本
        run: flutter --version

      - name: 获取依赖
        run: flutter pub get

      - name: 构建 APK (Release)
        run: flutter build apk --release

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: pixez-flutter-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
